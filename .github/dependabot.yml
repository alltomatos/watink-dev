version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/marketplace-hub"
    ignore:
      - dependency-name: "*"
    open-pull-requests-limit: 0

  - package-ecosystem: "gomod"
    directory: "/business"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "gomod"
    directory: "/plugin-manager"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: "npm"
    directory: "/legacy/backend"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
    open-pull-requests-limit: 0

  - package-ecosystem: "npm"
    directory: "/legacy/engine-standard"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
    open-pull-requests-limit: 0
