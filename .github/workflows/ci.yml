name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DB_HOST: localhost
  DB_PORT: 5432
  DB_USER: postgres
  DB_PASS: postgres
  DB_NAME: watink
  JWT_SECRET: test-jwt-secret
  JWT_REFRESH_SECRET: test-jwt-refresh-secret

jobs:
  build-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: watink
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        working-directory: business
        run: go mod download

      - name: Build
        working-directory: business
        run: go build ./...

      - name: Run linter
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: business
          version: v2.12.2
          only-new-issues: true

      - name: Run unit tests
        working-directory: business
        run: go test ./... -v -short -count=1

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Build
        working-directory: frontend
        run: npm run build

  smoke-test:
    runs-on: ubuntu-latest
    needs: build-backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: watink
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - 5672:5672
          - 15672:15672

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install requests

      - name: Start backend
        working-directory: business
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASS: postgres
          DB_NAME: watink
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-jwt-refresh-secret
        run: |
          nohup go run cmd/server/main.go > /tmp/watink-backend.log 2>&1 &
          echo $! > /tmp/watink-backend.pid

      - name: Wait backend health
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:8082/api/v1/health >/dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy" && tail -n 200 /tmp/watink-backend.log && exit 1

      - name: Run initial setup
        env:
          SMOKE_BASE_URL: http://localhost:8082/api/v1
          SMOKE_EMAIL: admin@test.com
          SMOKE_PASS: test123
        run: |
          python3 - <<'PY'
          import json
          import os
          import requests

          base = os.environ["SMOKE_BASE_URL"]
          payload = {
              "firstName": "Admin",
              "lastName": "Test",
              "email": os.environ["SMOKE_EMAIL"],
              "password": os.environ["SMOKE_PASS"],
              "document": "12345678900",
          }
          resp = requests.post(f"{base}/initial-setup", json=payload, timeout=15)
          print(resp.status_code, resp.text)
          if resp.status_code not in (200, 403):
              raise SystemExit("initial-setup failed")
          PY

      - name: Run smoke tests
        env:
          SMOKE_BASE_URL: http://localhost:8082/api/v1
          SMOKE_EMAIL: admin@test.com
          SMOKE_PASS: test123
        run: |
          python3 scripts/smoke_test.py

      - name: Dump backend logs on failure
        if: failure()
        run: tail -n 300 /tmp/watink-backend.log

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/watink-backend.pid ]; then
            kill $(cat /tmp/watink-backend.pid) || true
          fi
          pkill -f "cmd/server/main.go" || true