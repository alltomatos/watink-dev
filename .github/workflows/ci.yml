name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DB_HOST: localhost
  DB_PORT: 5432
  DB_USER: postgres
  DB_PASS: postgres
  DB_NAME: watink
  JWT_SECRET: test-jwt-secret
  JWT_REFRESH_SECRET: test-jwt-refresh-secret

jobs:
  build-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: watink
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Enable PostgreSQL extensions
        run: psql -h localhost -U postgres -d watink -c "CREATE EXTENSION IF NOT EXISTS vector;"
        env:
          PGPASSWORD: postgres

      - name: Download dependencies
        working-directory: business
        run: go mod download

      - name: Build
        working-directory: business
        run: go build ./...

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: business
          version: v2.12.2
          only-new-issues: true

      - name: Run unit tests
        working-directory: business
        run: go test ./... -v -short -count=1

      - name: Run integration tests
        working-directory: business
        env:
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/
          REDIS_URL: redis://localhost:6379
        run: go test ./... -tags integration -v -count=1 -timeout 180s

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (base)
        working-directory: frontend
        run: npm run lint --if-present

      - name: Design System governance (no hardcoded colors)
        working-directory: frontend
        run: npm run lint:ds

      - name: Build
        working-directory: frontend
        run: npm run build

  build-engine-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-engine-go-${{ hashFiles('engine-go/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-engine-go-

      - name: Download dependencies
        working-directory: engine-go
        run: go mod download

      - name: Build
        working-directory: engine-go
        run: go build ./...

      - name: Vet
        working-directory: engine-go
        run: go vet ./...

  test-knowledge:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: watink-knowledge
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'watink-knowledge/requirements-dev.txt'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Tests (pytest)
        run: pytest -q

  smoke-test:
    runs-on: ubuntu-latest
    needs: build-backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: watink
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - 5672:5672
          - 15672:15672

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.25'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install requests

      - name: Start backend
        working-directory: business
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASS: postgres
          DB_NAME: watink
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-jwt-refresh-secret
          APP_ENV: test
        run: |
          nohup go run cmd/server/main.go > /tmp/watink-backend.log 2>&1 &
          echo $! > /tmp/watink-backend.pid

      - name: Wait backend health
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:8082/api/v1/health >/dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy" && tail -n 200 /tmp/watink-backend.log && exit 1

      - name: Run initial setup
        env:
          SMOKE_BASE_URL: http://localhost:8082/api/v1
          SMOKE_EMAIL: admin@test.com
          SMOKE_PASS: test1234
        run: |
          python3 - <<'PY'
          import json
          import os
          import requests

          base = os.environ["SMOKE_BASE_URL"]
          payload = {
              "companyName": "Watink Smoke Test",
              "firstName": "Admin",
              "lastName": "Test",
              "email": os.environ["SMOKE_EMAIL"],
              "password": os.environ["SMOKE_PASS"],
              "document": "12345678900",
          }
          resp = requests.post(f"{base}/initial-setup", json=payload, timeout=15)
          print(resp.status_code, resp.text)
          if resp.status_code not in (200, 403):
              raise SystemExit("initial-setup failed")
          PY

      - name: Run smoke tests
        env:
          SMOKE_BASE_URL: http://localhost:8082/api/v1
          SMOKE_EMAIL: admin@test.com
          SMOKE_PASS: test1234
        run: |
          python3 scripts/smoke_test.py \
            --mode api \
            --base-url "$SMOKE_BASE_URL" \
            --email "$SMOKE_EMAIL" \
            --password "$SMOKE_PASS"

      - name: Dump backend logs on failure
        if: failure()
        run: tail -n 300 /tmp/watink-backend.log

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/watink-backend.pid ]; then
            kill $(cat /tmp/watink-backend.pid) || true
          fi
          pkill -f "cmd/server/main.go" || true

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: watink
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - 5672:5672
          - 15672:15672

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.25'

      - name: Install root deps (Playwright)
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Start backend
        working-directory: business
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASS: postgres
          DB_NAME: watink
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-jwt-refresh-secret
          APP_ENV: test
        run: |
          nohup go run cmd/server/main.go > /tmp/watink-backend-e2e.log 2>&1 &
          echo $! > /tmp/watink-backend-e2e.pid

      - name: Wait for backend
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:8082/api/v1/health >/dev/null; then
              echo "Backend healthy"; exit 0
            fi
            sleep 2
          done
          echo "Backend timeout" && tail -n 100 /tmp/watink-backend-e2e.log && exit 1

      - name: Run E2E API tests (no frontend required)
        working-directory: e2e
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_API_URL: http://localhost:8082/api/v1/
          E2E_ADMIN_EMAIL: admin@e2e.test
          E2E_ADMIN_PASS: e2e_password_123
        run: npx playwright test tests/tickets/ tests/admin/ tests/multitenancy/ --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Dump logs on failure
        if: failure()
        run: |
          tail -n 200 /tmp/watink-backend-e2e.log || true
