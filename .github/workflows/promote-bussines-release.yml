name: Promote Bussines Release

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Tag origem (ex: v0.7.121)"
        required: true
      target_tag:
        description: "Tag destino (ex: v0.7.121-stable)"
        required: true
      prerelease:
        description: "Destino é pre-release?"
        required: true
        default: "false"
      notes:
        description: "Notas da promoção"
        required: false
      environment_name:
        description: "Environment para ler secrets (ex: production)"
        required: true
        default: "production"

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment_name }}

    steps:
      - name: Validate token
        env:
          GH_TOKEN: ${{ secrets.WATINK_BUSSINES_PAT }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "Secret WATINK_BUSSINES_PAT não configurado."
            exit 1
          fi
          gh auth status

      - name: Download source assets
        env:
          GH_TOKEN: ${{ secrets.WATINK_BUSSINES_PAT }}
          SOURCE_TAG: ${{ github.event.inputs.source_tag }}
        run: |
          set -e
          mkdir -p promoted-assets
          gh release download "$SOURCE_TAG" \
            --repo alltomatos/watink-bussines \
            --dir promoted-assets
          ls -lah promoted-assets

      - name: Create or update target release
        env:
          GH_TOKEN: ${{ secrets.WATINK_BUSSINES_PAT }}
          SOURCE_TAG: ${{ github.event.inputs.source_tag }}
          TARGET_TAG: ${{ github.event.inputs.target_tag }}
          PRERELEASE: ${{ github.event.inputs.prerelease }}
          NOTES: ${{ github.event.inputs.notes }}
        run: |
          set -e

          TITLE="Watink Bussines ${TARGET_TAG}"
          BODY="Promoção de ${SOURCE_TAG} para ${TARGET_TAG}."
          if [ -n "${NOTES}" ]; then
            BODY="${NOTES}"
          fi

          if gh release view "$TARGET_TAG" --repo alltomatos/watink-bussines >/dev/null 2>&1; then
            echo "Release destino já existe, atualizando assets..."
          else
            if [ "${PRERELEASE}" = "true" ]; then
              gh release create "$TARGET_TAG" \
                --repo alltomatos/watink-bussines \
                --title "$TITLE" \
                --notes "$BODY" \
                --prerelease
            else
              gh release create "$TARGET_TAG" \
                --repo alltomatos/watink-bussines \
                --title "$TITLE" \
                --notes "$BODY"
            fi
          fi

          gh release upload "$TARGET_TAG" promoted-assets/* \
            --repo alltomatos/watink-bussines \
            --clobber

      - name: Summary
        env:
          SOURCE_TAG: ${{ github.event.inputs.source_tag }}
          TARGET_TAG: ${{ github.event.inputs.target_tag }}
        run: |
          echo "✅ Promoção concluída: ${SOURCE_TAG} -> ${TARGET_TAG}"
