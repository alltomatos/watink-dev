name: Publish Docker Hub (watink-business)

# SEGURANÇA: dispara SÓ em push a develop/main (+ manual). NUNCA em pull_request —
# os runners self-hosted (omniroute-watink-dev-1/2) montam /var/run/docker.sock
# (root efetivo no host) e usam um PAT compartilhado; permitir pull_request
# exporia esse acesso a qualquer PR aberto no repo, inclusive do Dependabot.
on:
  push:
    branches: [develop, main]
  workflow_dispatch: {}

concurrency:
  group: publish-dockerhub-business-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Revalidação rápida do commit exato que vai virar imagem publicada — a PR que
  # trouxe este commit já passou pelo ci.yml (GitHub-hosted) antes do merge; este
  # job roda de novo nos runners da omniroute só como último gate antes do push
  # para o Docker Hub (build+vet+test, sem segredo externo real — credenciais de
  # teste fixas, iguais às do ci.yml).
  validate:
    runs-on: [self-hosted, linux, x64, omniroute]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: watink
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - 5672:5672
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: watink
      JWT_SECRET: test-jwt-secret
      JWT_REFRESH_SECRET: test-jwt-refresh-secret
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Enable PostgreSQL extensions
        run: psql -h localhost -U postgres -d watink -c "CREATE EXTENSION IF NOT EXISTS vector;"
        env:
          PGPASSWORD: postgres

      - name: business — build + vet + unit tests
        working-directory: business
        run: |
          go build ./...
          go vet ./...
          go test ./... -short -count=1

      - name: engine-go — build + vet
        working-directory: engine-go
        run: |
          go build ./...
          go vet ./...

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: frontend — install + build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  build-and-push:
    needs: validate
    runs-on: [self-hosted, linux, x64, omniroute]
    steps:
      - uses: actions/checkout@v7

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="ronaldodavi/watink-business"
          TAGS="${IMAGE}:sha-${SHORT_SHA}"
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          elif [ "${GITHUB_REF_NAME}" = "develop" ]; then
            TAGS="${TAGS},${IMAGE}:develop"
          else
            TAGS="${TAGS},${IMAGE}:${GITHUB_REF_NAME}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Tags: ${TAGS}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push watink-business
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.business
          push: true
          tags: ${{ steps.tags.outputs.tags }}
