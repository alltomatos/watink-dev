# Watink — Full Stack Development Environment
# Usage: docker compose -f docker-compose.dev.yml up --build
#
# This compose file mirrors the production architecture but with dev-friendly
# settings: source mounts for hot-reload, exposed debug ports, and seeded DB.

services:
  # ──────────────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────────────

  postgres:
    build:
      context: ./infra/postgres
      dockerfile: Dockerfile
    container_name: watink-postgres
    environment:
      POSTGRES_DB: watink
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASS:-watink_secret_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - watink_net

  redis:
    image: redis:7-alpine
    container_name: watink-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - watink_net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: watink-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - watink_net

  # ──────────────────────────────────────────────
  # Application Services
  # ──────────────────────────────────────────────

  watink-business:
    build:
      context: ./business
      dockerfile: Dockerfile.dev
    container_name: watink-business
    ports:
      - "8082:8082"
    environment:
      - PORT_GO=8082
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=${DB_PASS:-watink_secret_pass}
      - DB_NAME=watink
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672
      - REDIS_URL=redis://redis:6379
      - ENGINE_HEALTH_URL=http://watink-engine:8083/health
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev_jwt_refresh_secret_change_in_prod}
      - DOCS_PUBLIC=${DOCS_PUBLIC:-false}
      - PLUGIN_HUB_URL=http://plugin-manager:8081/api/v1/hub
      # Dev: o gateway de IA (omniroute) roda no host em localhost:20128; de dentro
      # do container isso vira host.docker.internal (aiclient.rewriteDevHost).
      - AI_BASEURL_HOST_REWRITE=host.docker.internal
      - KNOWLEDGE_SERVICE_URL=http://watink-knowledge:8085
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-dev_internal_token_change_in_prod}
      - S3_ENDPOINT=minio:9000
      - S3_BUCKET=watink-knowledge
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - S3_USE_SSL=false
      - S3_REGION=us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./business:/app
      - business_go_mod:/go/pkg/mod
      - business_go_cache:/root/.cache/go-build
      - uploads_data:/app/public
      - sessions_data:/app/.sessions_auth
    networks:
      - watink_net
    restart: unless-stopped

  watink-engine:
    build:
      context: ./engine-go
      dockerfile: Dockerfile.dev
    container_name: watink-engine
    # Public DNS resolvers — Docker's embedded resolver (127.0.0.11) intermittently
    # fails to resolve web.whatsapp.com ("server misbehaving"), breaking reconnects.
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8083:8083"
    environment:
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=${DB_PASS:-watink_secret_pass}
      - DB_NAME=watink
      - HEALTH_PORT=8083
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ./engine-go:/app
      - engine_go_mod:/go/pkg/mod
      - engine_go_cache:/root/.cache/go-build
      - engine_sessions:/root/.sessions_auth
    networks:
      - watink_net
    restart: unless-stopped

  plugin-manager:
    build:
      context: ./plugin-manager
      dockerfile: Dockerfile
    container_name: watink-plugin-manager
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - HUB_URL=
    networks:
      - watink_net
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Frontend (standalone — only if NOT using the
  # embedded frontend inside watink-business)
  # Uncomment the block below for isolated frontend dev.
  # ──────────────────────────────────────────────

  frontend:
    image: node:20-alpine
    container_name: watink-frontend
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      # Volume anônimo para node_modules: evita que o bind mount do host sobreescreva
      # os módulos compilados para Linux dentro do container
      - frontend_node_modules:/app/node_modules
    environment:
      # VITE_BACKEND_URL vazio no browser (same-origin via proxy Vite).
      # BACKEND_PROXY_TARGET é usado APENAS pelo proxy server-side do Vite para
      # encaminhar /api/* para o container do backend na rede Docker.
      - BACKEND_PROXY_TARGET=http://watink-business:8082
      # SSE vai direto para o backend (sem passar pelo proxy Vite) porque usa JWT
      # no URL (sem cookie), então SameSite não é um problema. Isso evita que o
      # proxy Vite mate as conexões longas de SSE por timeout interno.
      - VITE_SSE_URL=http://127.0.0.1:8082
      # Polling para HMR funcionar com volumes Docker no Windows
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_POLL_INTERVAL=300
      - WATCHPACK_POLLING=true
    depends_on:
      - watink-business
    networks:
      - watink_net
    restart: on-failure
    stop_grace_period: 10s

  watink-knowledge:
    build:
      context: ./watink-knowledge
      dockerfile: Dockerfile.dev
    container_name: watink-knowledge
    ports:
      - "8085:8085"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=${DB_PASS:-watink_secret_pass}
      - DB_NAME=watink
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-dev_internal_token_change_in_prod}
      - OMNIROUTE_HOST_REWRITE=host.docker.internal
      # Embedding: dimensão do índice halfvec. EMBED_DIMENSIONS>0 envia `dimensions`
      # no payload (truncagem MRL) — usado p/ encaixar modelos como qwen3-embedding
      # (Ollama, nativo 2560) no índice halfvec(2048). 0 = não envia (nemotron 2048 nativo).
      - EMBED_DIM=${EMBED_DIM:-2048}
      - EMBED_DIMENSIONS=${EMBED_DIMENSIONS:-0}
      # Firecrawl (web scraping de fontes `url`). Aponta para o serviço Firecrawl real
      # (mesmo de produção). O self-hosted não exige key — FIRECRAWL_API_KEY é opcional.
      - FIRECRAWL_URL=${FIRECRAWL_URL:-http://firecrawl:3002}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - S3_ENDPOINT=minio:9000
      - S3_BUCKET=watink-knowledge
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - S3_USE_SSL=false
      - S3_REGION=us-east-1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./watink-knowledge:/app
    networks:
      - watink_net
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Firecrawl — scraper REAL para fontes `url` da Base de Conhecimento (RAG).
  # Mesmo serviço que roda em produção (lá via Swarm; aqui via compose standalone).
  # 100% imagens publicadas no GHCR (org `firecrawl`) — sem build-from-source.
  # Infra DEDICADA (firecrawl-redis/rabbitmq/nuq-postgres) para NÃO colidir com o
  # Redis (keyspace wbot:), o RabbitMQ (contratos wbot.<tenant>) e o Postgres do
  # Watink. O watink-knowledge alcança em http://firecrawl:3002 (rede watink_net).
  # Subir só este stack:  docker compose -f docker-compose.dev.yml up -d firecrawl
  # ──────────────────────────────────────────────
  firecrawl:
    image: ghcr.io/firecrawl/firecrawl:2.10.14   # pin de versão (latest é mutável)
    container_name: watink-firecrawl
    command: ["node", "dist/src/harness.js", "--start-docker"]
    ports:
      - "3002:3002"   # API /v1/scrape (interno: firecrawl:3002)
    environment:
      - PORT=3002
      - INTERNAL_PORT=3002
      - HOST=0.0.0.0
      - USE_DB_AUTHENTICATION=false          # self-host sem Supabase (bypass de auth)
      - REDIS_URL=redis://firecrawl-redis:6379
      - REDIS_RATE_LIMIT_URL=redis://firecrawl-redis:6379
      - PLAYWRIGHT_MICROSERVICE_URL=http://firecrawl-playwright:3000/scrape
      # Postgres da fila NUQ — o harness deriva NUQ_DATABASE_URL dos POSTGRES_*
      # (POSTGRES_HOST != localhost). Issue #2384: harness.ts tem postgres/postgres
      # hardcoded — manter exatamente assim, senão o worker crasha no boot.
      - POSTGRES_HOST=firecrawl-nuq-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - NUQ_RABBITMQ_URL=amqp://guest:guest@firecrawl-rabbitmq:5672
      - NUM_WORKERS_PER_QUEUE=4
      - BULL_AUTH_KEY=${FIRECRAWL_BULL_AUTH_KEY:-CHANGEME}
      - OPENAI_API_KEY=                       # opcional; scrape básico não precisa
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      firecrawl-redis:
        condition: service_started
      firecrawl-playwright:
        condition: service_started
      firecrawl-nuq-postgres:
        condition: service_healthy
      firecrawl-rabbitmq:
        condition: service_healthy   # mitiga ECONNREFUSED 5672 no cold start (#2583)
    networks:
      - watink_net
    restart: unless-stopped

  firecrawl-playwright:
    image: ghcr.io/firecrawl/playwright-service:latest
    container_name: watink-firecrawl-playwright
    environment:
      - PORT=3000
      - MAX_CONCURRENT_PAGES=4
      - BLOCK_MEDIA=true
    shm_size: 2gb   # Chromium crasha com /dev/shm padrão (64MB)
    networks:
      - watink_net
    restart: unless-stopped

  firecrawl-redis:
    image: redis:alpine
    container_name: watink-firecrawl-redis
    command: ["redis-server", "--bind", "0.0.0.0"]
    networks:
      - watink_net
    restart: unless-stopped

  firecrawl-rabbitmq:
    image: rabbitmq:3-management
    container_name: watink-firecrawl-rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 10s
      retries: 12
    networks:
      - watink_net
    restart: unless-stopped

  firecrawl-nuq-postgres:
    image: ghcr.io/firecrawl/nuq-postgres:latest
    container_name: watink-firecrawl-nuq-postgres
    environment:
      - POSTGRES_USER=postgres       # casar com o api (harness hardcoded, #2384)
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    # SEM `ports:` — NUNCA expor (vetor de cryptominer, #2528/#2384).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - firecrawl_nuq_pgdata:/var/lib/postgresql/data
    networks:
      - watink_net
    restart: unless-stopped

  # Ollama — embedding self-hosted para a Base de Conhecimento (RAG). OPT-IN:
  # só sobe com `docker compose --profile ollama up -d` (não no `up` padrão).
  # Alternativa ao embedding via omniroute/naga: local, grátis, privado, sem créditos.
  # Aponte o embedding via setting `aiEmbeddingBaseURL=http://ollama:11434/v1` (chat
  # segue no omniroute). ⚠️ EM CPU é LENTO para modelos médios/grandes (medido:
  # ~21s/chunk bge-m3, ~50s/chunk qwen3:4b num chunk de ~512 tok) — viável só com
  # modelo pequeno (nomic-embed-text ~4s/chunk) ou, idealmente, com GPU. Modelos:
  # `docker exec watink-ollama ollama pull <modelo>`.
  ollama:
    image: ollama/ollama:latest
    container_name: watink-ollama
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - watink_net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: watink-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - watink_net
    restart: unless-stopped

networks:
  watink_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  sessions_data:
  engine_sessions:
  engine_go_mod:
  engine_go_cache:
  business_go_mod:
  business_go_cache:
  firecrawl_nuq_pgdata:
  ollama_models:
  minio_data:
  frontend_node_modules:
    # node_modules do frontend ficam isolados no container (binários Linux)
    # O bind mount ./frontend:/app cobre o código-fonte; este volume "sombra"
    # /app/node_modules para que npm install dentro do container não conflite
    # com node_modules do Windows no host.
