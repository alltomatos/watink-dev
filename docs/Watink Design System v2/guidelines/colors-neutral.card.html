<!-- @dsCard group="Colors" viewport="700x160" name="Neutros" subtitle="Escalas Slate + Neutral — fundos, texto, bordas" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-default); padding: 16px 20px; font-family: var(--font-primary, 'Inter', sans-serif); }
  .section { margin-bottom: 8px; }
  .label { font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
  .row { display: flex; gap: 4px; }
  .swatch { height: 32px; flex: 1; border-radius: 5px; border: 1px solid rgba(0,0,0,.06); }
  .step { font-size: 8px; color: var(--text-muted); text-align: center; margin-top: 3px; }
</style>
</head>
<body>
<div class="section">
  <div class="label">Slate</div>
  <div class="row">
    <div><div class="swatch" style="background:#F8FAFC;"></div><div class="step">50</div></div>
    <div><div class="swatch" style="background:#F1F5F9;"></div><div class="step">100</div></div>
    <div><div class="swatch" style="background:#E2E8F0;"></div><div class="step">200</div></div>
    <div><div class="swatch" style="background:#CBD5E1;"></div><div class="step">300</div></div>
    <div><div class="swatch" style="background:#94A3B8;"></div><div class="step">400</div></div>
    <div><div class="swatch" style="background:#64748B;"></div><div class="step">500</div></div>
    <div><div class="swatch" style="background:#475569;"></div><div class="step">600</div></div>
    <div><div class="swatch" style="background:#334155;"></div><div class="step">700</div></div>
    <div><div class="swatch" style="background:#1E293B;"></div><div class="step">800</div></div>
    <div><div class="swatch" style="background:#0F172A;"></div><div class="step">900</div></div>
    <div><div class="swatch" style="background:#020617;"></div><div class="step">950</div></div>
  </div>
</div>
<div class="section">
  <div class="label">Neutral</div>
  <div class="row">
    <div><div class="swatch" style="background:#FFFFFF;"></div><div class="step">0</div></div>
    <div><div class="swatch" style="background:#F9FAFB;"></div><div class="step">50</div></div>
    <div><div class="swatch" style="background:#F3F4F6;"></div><div class="step">100</div></div>
    <div><div class="swatch" style="background:#E5E7EB;"></div><div class="step">200</div></div>
    <div><div class="swatch" style="background:#D1D5DB;"></div><div class="step">300</div></div>
    <div><div class="swatch" style="background:#9CA3AF;"></div><div class="step">400</div></div>
    <div><div class="swatch" style="background:#6B7280;"></div><div class="step">500</div></div>
    <div><div class="swatch" style="background:#4B5563;"></div><div class="step">600</div></div>
    <div><div class="swatch" style="background:#374151;"></div><div class="step">700</div></div>
    <div><div class="swatch" style="background:#1F2937;"></div><div class="step">800</div></div>
    <div><div class="swatch" style="background:#111827;"></div><div class="step">900</div></div>
    <div><div class="swatch" style="background:#030712;"></div><div class="step">950</div></div>
  </div>
</div>
</body>
</html>
