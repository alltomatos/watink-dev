<!-- @dsCard group="Colors" viewport="700x140" name="Azul Primário" subtitle="Cor de ação — escala azul + tokens principais" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-default); padding: 16px 20px; font-family: var(--font-primary, 'Inter', sans-serif); }
  .row { display: flex; gap: 5px; align-items: flex-end; margin-bottom: 10px; }
  .swatch { flex: 1; border-radius: 6px; position: relative; }
  .lbl { font-size: 9px; color: var(--text-muted); text-align: center; margin-top: 4px; letter-spacing: 0.03em; }
  .tokens { display: flex; gap: 8px; }
  .token { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text-secondary); }
  .token-dot { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="row">
  <div><div class="swatch" style="height:30px;background:#E3F2FD;"></div><div class="lbl">50</div></div>
  <div><div class="swatch" style="height:34px;background:#BBDEFB;"></div><div class="lbl">100</div></div>
  <div><div class="swatch" style="height:38px;background:#90CAF9;"></div><div class="lbl">200</div></div>
  <div><div class="swatch" style="height:42px;background:#64B5F6;"></div><div class="lbl">300</div></div>
  <div><div class="swatch" style="height:46px;background:#42A5F5;"></div><div class="lbl">400</div></div>
  <div><div class="swatch" style="height:56px;background:#1A73E8;border:2px solid rgba(0,0,0,.1);"></div><div class="lbl" style="font-weight:700;color:#1A73E8;">500 ★</div></div>
  <div><div class="swatch" style="height:50px;background:#0063E6;"></div><div class="lbl">600</div></div>
  <div><div class="swatch" style="height:46px;background:#1565C0;"></div><div class="lbl">700</div></div>
  <div><div class="swatch" style="height:42px;background:#0D47A1;"></div><div class="lbl">800</div></div>
  <div><div class="swatch" style="height:38px;background:#0A246A;"></div><div class="lbl">900</div></div>
</div>
<div class="tokens">
  <div class="token"><div class="token-dot" style="background:var(--action-primary);"></div>--action-primary</div>
  <div class="token"><div class="token-dot" style="background:var(--action-primary-hover);"></div>--action-primary-hover</div>
  <div class="token"><div class="token-dot" style="background:var(--action-primary-bg);border:1px solid #ddd;"></div>--action-primary-bg</div>
</div>
</body>
</html>
