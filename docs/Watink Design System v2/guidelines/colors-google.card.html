<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-default); padding: 16px 20px; font-family: var(--font-primary, 'Inter', sans-serif); }
  .row { display: flex; gap: 8px; }
  .item { text-align: center; }
  .dot { width: 44px; height: 44px; border-radius: 12px; }
  .name { font-size: 9px; color: var(--text-secondary); margin-top: 5px; }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="dot" style="background:#1A73E8;"></div><div class="name">Blue</div></div>
  <div class="item"><div class="dot" style="background:#1E8E3E;"></div><div class="name">Green</div></div>
  <div class="item"><div class="dot" style="background:#F9AB00;"></div><div class="name">Yellow</div></div>
  <div class="item"><div class="dot" style="background:#D93025;"></div><div class="name">Red</div></div>
  <div class="item"><div class="dot" style="background:#7C4DFF;"></div><div class="name">Purple</div></div>
  <div class="item"><div class="dot" style="background:#00897B;"></div><div class="name">Teal</div></div>
  <div class="item"><div class="dot" style="background:#E8710A;"></div><div class="name">Orange</div></div>
  <div class="item"><div class="dot" style="background:#D01884;"></div><div class="name">Pink</div></div>
</div>
</body>
</html>
