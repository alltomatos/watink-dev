<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-default); padding: 16px 20px; font-family: var(--font-primary, 'Inter', sans-serif); }
  .chat { display: flex; flex-direction: column; gap: 8px; background: #e5ddd5 url('../assets/wa-background.png') center/200px; border-radius: 10px; padding: 12px; }
  .msg { max-width: 60%; padding: 8px 12px; border-radius: 10px; font-size: 12px; line-height: 1.4; }
  .msg-left  { background: var(--message-left-bg);  color: var(--message-left-text);  align-self: flex-start; border-bottom-left-radius: 2px; }
  .msg-right { background: var(--message-right-bg); color: var(--message-right-text); align-self: flex-end;   border-bottom-right-radius: 2px; }
  .ts { font-size: 9px; color: var(--message-timestamp-text); text-align: right; margin-top: 2px; }
  .daily { align-self: center; background: var(--message-daily-bg); color: var(--message-daily-text); font-size: 10px; padding: 3px 10px; border-radius: 10px; }
</style>
</head>
<body>
<div class="chat">
  <div class="daily">Hoje</div>
  <div class="msg msg-left">Olá! Preciso de suporte com meu pedido.<div class="ts">09:42</div></div>
  <div class="msg msg-right">Claro! Me informe o número do pedido.<div class="ts">09:43 ✓✓</div></div>
  <div class="msg msg-left">Pedido #4821<div class="ts">09:44</div></div>
</div>
</body>
</html>
