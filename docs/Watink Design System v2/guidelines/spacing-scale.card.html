<!-- @dsCard group="Spacing" viewport="700x150" name="Escala de Espaçamento" subtitle="--space-0 (0px) até --space-20 (80px)" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-default); padding: 16px 20px; font-family: var(--font-primary, 'Inter', sans-serif); }
  .row { display: flex; align-items: flex-end; gap: 10px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .bar { background: var(--action-primary); border-radius: 3px; width: 28px; opacity: 0.85; }
  .lbl { font-size: 9px; color: var(--text-muted); font-family: var(--font-mono, monospace); text-align: center; }
  .px  { font-size: 8px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="bar" style="height:2px;"></div><div class="lbl">0.5<br><span class="px">2px</span></div></div>
  <div class="item"><div class="bar" style="height:4px;"></div><div class="lbl">1<br><span class="px">4px</span></div></div>
  <div class="item"><div class="bar" style="height:6px;"></div><div class="lbl">1.5<br><span class="px">6px</span></div></div>
  <div class="item"><div class="bar" style="height:8px;"></div><div class="lbl">2<br><span class="px">8px</span></div></div>
  <div class="item"><div class="bar" style="height:12px;"></div><div class="lbl">3<br><span class="px">12px</span></div></div>
  <div class="item"><div class="bar" style="height:16px;"></div><div class="lbl">4<br><span class="px">16px</span></div></div>
  <div class="item"><div class="bar" style="height:20px;"></div><div class="lbl">5<br><span class="px">20px</span></div></div>
  <div class="item"><div class="bar" style="height:24px;"></div><div class="lbl">6<br><span class="px">24px</span></div></div>
  <div class="item"><div class="bar" style="height:32px;"></div><div class="lbl">8<br><span class="px">32px</span></div></div>
  <div class="item"><div class="bar" style="height:40px;"></div><div class="lbl">10<br><span class="px">40px</span></div></div>
  <div class="item"><div class="bar" style="height:48px;"></div><div class="lbl">12<br><span class="px">48px</span></div></div>
  <div class="item"><div class="bar" style="height:64px;"></div><div class="lbl">16<br><span class="px">64px</span></div></div>
  <div class="item"><div class="bar" style="height:80px;"></div><div class="lbl">20<br><span class="px">80px</span></div></div>
</div>
</body>
</html>
