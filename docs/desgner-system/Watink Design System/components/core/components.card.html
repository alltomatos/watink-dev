<!-- @dsCard group="Components" viewport="700x540" name="Componentes Principais" subtitle="Button · StatusChip · Card · MetricCard · Avatar" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-default); font-family: var(--font-primary, 'Inter', sans-serif); padding: 16px 20px; }
  .section { margin-bottom: 16px; }
  .section-label { font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .mi { font-size: 18px; line-height: 1; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const NS = window.WatinkDesignSystem_9345f8;
const { Button, StatusChip, Card, MetricCard, Avatar } = NS;

const Icon = ({ name, style }) => (
  <span className="material-icons-outlined mi" style={style}>{name}</span>
);

function Demo() {
  return (
    <div>
      <div className="section">
        <div className="section-label">Button — Variants</div>
        <div className="row">
          <Button variant="primary">Entrar</Button>
          <Button variant="outlined">Cancelar</Button>
          <Button variant="ghost">Ver mais</Button>
          <Button variant="danger">Excluir</Button>
          <Button variant="primary" disabled>Desabilitado</Button>
        </div>
      </div>
      <div className="section">
        <div className="section-label">Button — Sizes &amp; Icons</div>
        <div className="row">
          <Button variant="primary" size="sm">Pequeno</Button>
          <Button variant="primary" size="md">Médio</Button>
          <Button variant="primary" size="lg">Grande</Button>
          <Button variant="primary" icon={<Icon name="add" style={{color:'#fff'}} />}>Nova Fila</Button>
          <Button variant="outlined" icon={<Icon name="download" style={{color:'var(--action-primary)'}} />}>Exportar</Button>
        </div>
      </div>
      <div className="section">
        <div className="section-label">StatusChip</div>
        <div className="row">
          <StatusChip status="success" label="Online" />
          <StatusChip status="error"   label="Desconectado" />
          <StatusChip status="warning" label="Aguardando" />
          <StatusChip status="info"    label="Em Atendimento" />
          <StatusChip status="default" label="Fechado" />
          <StatusChip status="success" label="Resolvido" size="sm" />
          <StatusChip status="warning" label="Pendente" size="lg" dot={false} />
        </div>
      </div>
      <div className="section">
        <div className="section-label">Avatar — Sizes &amp; States</div>
        <div className="row" style={{alignItems:'flex-end'}}>
          <Avatar name="A" size="xs" />
          <Avatar name="Ana Lima" size="sm" />
          <Avatar name="Carlos Mendes" size="md" />
          <Avatar name="Beatriz Santos" size="lg" />
          <Avatar name="Rafael Costa" size="xl" />
          <div style={{width:1,height:40,background:'var(--border-default)',margin:'0 4px'}} />
          <Avatar name="Ana Lima" size="md" online={true} />
          <Avatar name="Carlos" size="md" online={false} />
          <Avatar src="https://i.pravatar.cc/64?u=1" name="User" size="lg" online={true} />
        </div>
      </div>
      <div className="row" style={{gap:12,alignItems:'flex-start'}}>
        <div style={{flex:'0 0 220px'}}>
          <div className="section-label" style={{marginBottom:8}}>MetricCard</div>
          <MetricCard
            label="Tickets Abertos"
            value="142"
            color="primary"
            icon={<Icon name="confirmation_number" />}
            trend={{value:'+12%', positive:true}}
          />
        </div>
        <div style={{flex:'0 0 220px'}}>
          <div className="section-label" style={{marginBottom:8}}>MetricCard — success</div>
          <MetricCard
            label="Atendidos Hoje"
            value="38"
            color="success"
            icon={<Icon name="support_agent" />}
          />
        </div>
        <div style={{flex:1}}>
          <div className="section-label" style={{marginBottom:8}}>Card — com header</div>
          <Card
            title="Filas Ativas"
            subtitle="3 filas em operação"
            icon={<Icon name="account_tree" style={{color:'var(--google-yellow)'}} />}
            iconColor="rgba(249,171,0,0.12)"
            actions={<Button variant="outlined" size="sm">Gerenciar</Button>}
          >
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:4}}>
              <StatusChip status="success" label="Suporte" size="sm" />
              <StatusChip status="success" label="Vendas" size="sm" />
              <StatusChip status="warning" label="Financeiro" size="sm" />
            </div>
          </Card>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Demo />);
</script>
</body>
</html>
