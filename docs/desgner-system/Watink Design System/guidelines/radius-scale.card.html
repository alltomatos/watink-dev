<!-- @dsCard group="Spacing" viewport="700x120" name="Border Radius" subtitle="--radius-sm (6px) até --radius-full — escala de arredondamento" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-default); padding: 16px 20px; font-family: var(--font-primary, 'Inter', sans-serif); }
  .row { display: flex; gap: 12px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { width: 56px; height: 56px; background: var(--action-primary); opacity: 0.85; }
  .lbl { font-size: 9px; color: var(--text-muted); text-align: center; }
  .val { font-size: 8px; color: var(--text-muted); font-family: var(--font-mono, monospace); }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:0px;"></div><div class="lbl">none<br><span class="val">0px</span></div></div>
  <div class="item"><div class="box" style="border-radius:6px;"></div><div class="lbl">sm<br><span class="val">6px</span></div></div>
  <div class="item"><div class="box" style="border-radius:8px;"></div><div class="lbl">md<br><span class="val">8px</span></div></div>
  <div class="item"><div class="box" style="border-radius:12px;"></div><div class="lbl">lg<br><span class="val">12px</span></div></div>
  <div class="item"><div class="box" style="border-radius:16px;"></div><div class="lbl">xl ★<br><span class="val">16px</span></div></div>
  <div class="item"><div class="box" style="border-radius:20px;"></div><div class="lbl">2xl<br><span class="val">20px</span></div></div>
  <div class="item"><div class="box" style="border-radius:9999px;"></div><div class="lbl">full<br><span class="val">9999px</span></div></div>
</div>
</body>
</html>
