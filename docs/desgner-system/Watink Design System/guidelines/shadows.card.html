<!-- @dsCard group="Spacing" viewport="700x200" name="Sombras" subtitle="Escala de elevação — sm a strong + tokens de sidebar/appbar" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-surface-alt); padding: 20px; font-family: var(--font-primary, 'Inter', sans-serif); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .item { background: var(--bg-surface); border-radius: 10px; padding: 12px 16px; }
  .name { font-size: 10px; font-weight: 600; color: var(--text-secondary); margin-bottom: 2px; }
  .val  { font-size: 9px; color: var(--text-muted); font-family: var(--font-mono, monospace); }
</style>
</head>
<body>
<div class="row">
  <div class="item" style="box-shadow:var(--shadow-sm);"><div class="name">--shadow-sm</div><div class="val">1px subtle</div></div>
  <div class="item" style="box-shadow:var(--shadow-md);"><div class="name">--shadow-md</div><div class="val">4px medium</div></div>
  <div class="item" style="box-shadow:var(--card-shadow);"><div class="name">--card-shadow</div><div class="val">card default</div></div>
  <div class="item" style="box-shadow:var(--shadow-lg);"><div class="name">--shadow-lg</div><div class="val">10px large</div></div>
  <div class="item" style="box-shadow:var(--shadow-xl);"><div class="name">--shadow-xl</div><div class="val">20px modal</div></div>
  <div class="item" style="box-shadow:var(--shadow-strong);"><div class="name">--shadow-strong</div><div class="val">8px/30px</div></div>
  <div class="item" style="box-shadow:var(--shadow-appbar);"><div class="name">--shadow-appbar</div><div class="val">appbar line</div></div>
</div>
</body>
</html>
