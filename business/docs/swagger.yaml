basePath: /api/v1
definitions:
  controllers.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  models.Cargo:
    properties:
      createdAt:
        type: string
      description:
        type: string
      id:
        type: integer
      isSystem:
        type: boolean
      name:
        type: string
      permissions:
        items:
          $ref: '#/definitions/models.Permission'
        type: array
      tenantId:
        type: string
      updatedAt:
        type: string
    type: object
  models.Client:
    properties:
      addresses:
        items:
          $ref: '#/definitions/models.ClientAddress'
        type: array
      contacts:
        description: Relations
        items:
          $ref: '#/definitions/models.Contact'
        type: array
      createdAt:
        type: string
      document:
        description: |-
          Document is a TRANSIENT (gorm:"-", not persisted) field the controller
          populates in API responses after decrypting DocumentEnc. It exists so
          JSON consumers keep seeing a plain "document" field — do not mistake it
          for a duplicate/dead column.
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      notes:
        type: string
      phone:
        type: string
      socialName:
        description: |-
          SocialName is exclusive to PF (LGPD — Decreto 8.727/2016). When set, it
          replaces the civil name on every display surface (ticket list, chat
          bubble, header, notifications, Pipeline/Deal, Protocol, reports).
        type: string
      tenantId:
        type: string
      type:
        description: |-
          Type is "pf" (pessoa física) or "pj" (pessoa jurídica). Enum validation
          happens in the controller, not here.
        type: string
      updatedAt:
        type: string
    type: object
  models.ClientAddress:
    properties:
      city:
        type: string
      clientId:
        type: integer
      complement:
        type: string
      createdAt:
        type: string
      id:
        type: integer
      isPrimary:
        type: boolean
      label:
        type: string
      latitude:
        description: |-
          Latitude/Longitude are nullable — populated best-effort by geocoding;
          a failed/unavailable geocode leaves them NULL and never blocks the save.
        type: number
      longitude:
        type: number
      neighborhood:
        type: string
      number:
        type: string
      state:
        type: string
      street:
        type: string
      tenantId:
        type: string
      updatedAt:
        type: string
      zipCode:
        type: string
    type: object
  models.Contact:
    properties:
      client:
        $ref: '#/definitions/models.Client'
      clientId:
        description: |-
          ClientID is nullable — a Contact can exist and generate Tickets without
          ever being linked to a Client (someone messages in without being
          registered). A Contact belongs to at most one Client; the link is
          always manual (ADR 0023) — no unique constraint here, since multiple
          Contacts may point to the same Client.
        type: integer
      createdAt:
        type: string
      email:
        type: string
      id:
        type: integer
      isGroup:
        type: boolean
      lid:
        type: string
      name:
        type: string
      number:
        type: string
      profilePicUrl:
        type: string
      tenantId:
        type: string
      tickets:
        description: Relations
        items:
          $ref: '#/definitions/models.Ticket'
        type: array
      updatedAt:
        type: string
      wallet:
        $ref: '#/definitions/models.User'
      walletUserId:
        type: integer
    type: object
  models.Message:
    properties:
      ack:
        type: integer
      body:
        type: string
      contactId:
        type: integer
      createdAt:
        type: string
      dataJson:
        type: string
      fromMe:
        type: boolean
      id:
        type: string
      isDeleted:
        type: boolean
      mediaType:
        type: string
      mediaUrl:
        type: string
      participant:
        type: string
      quotedMsgId:
        type: string
      reactions:
        type: string
      read:
        type: boolean
      tenantId:
        type: string
      ticket:
        allOf:
        - $ref: '#/definitions/models.Ticket'
        description: Relations
      ticketId:
        type: integer
      updatedAt:
        type: string
    type: object
  models.Permission:
    properties:
      action:
        type: string
      createdAt:
        type: string
      description:
        type: string
      id:
        type: integer
      isSystem:
        type: boolean
      resource:
        type: string
      updatedAt:
        type: string
    type: object
  models.Queue:
    properties:
      color:
        type: string
      createdAt:
        type: string
      distributionStrategy:
        type: string
      greetingMessage:
        type: string
      id:
        type: integer
      name:
        type: string
      parent:
        allOf:
        - $ref: '#/definitions/models.Queue'
        description: Relations
      parentId:
        type: integer
      prioritizeWallet:
        type: boolean
      tenantId:
        type: string
      updatedAt:
        type: string
      whatsapps:
        items:
          $ref: '#/definitions/models.Whatsapp'
        type: array
    type: object
  models.Tag:
    properties:
      archived:
        type: boolean
      color:
        type: string
      createdAt:
        type: string
      description:
        type: string
      group:
        $ref: '#/definitions/models.TagGroup'
      groupId:
        type: integer
      icon:
        type: string
      id:
        type: integer
      name:
        type: string
      tenantId:
        type: string
      updatedAt:
        type: string
    type: object
  models.TagGroup:
    properties:
      createdAt:
        type: string
      id:
        type: integer
      name:
        type: string
      tenantId:
        type: string
      updatedAt:
        type: string
    type: object
  models.Tenant:
    properties:
      createdAt:
        type: string
      document:
        type: string
      id:
        type: string
      name:
        type: string
      ownerId:
        type: integer
      status:
        type: string
      updatedAt:
        type: string
      users:
        description: Relations
        items:
          $ref: '#/definitions/models.User'
        type: array
    type: object
  models.Ticket:
    properties:
      contact:
        allOf:
        - $ref: '#/definitions/models.Contact'
        description: Relations
      contactId:
        type: integer
      createdAt:
        type: string
      id:
        type: integer
      isCommunity:
        type: boolean
      isGroup:
        type: boolean
      isSubGroup:
        type: boolean
      lastMessage:
        type: string
      messages:
        items:
          $ref: '#/definitions/models.Message'
        type: array
      queueId:
        type: integer
      status:
        type: string
      tags:
        description: |-
          Tags is populated manually (batch query via EntityTags) by ListTickets —
          not a GORM association, since EntityTag is polymorphic (entityType+entityId).
        items:
          $ref: '#/definitions/models.Tag'
        type: array
      tenantId:
        type: string
      unreadMessages:
        type: integer
      updatedAt:
        type: string
      user:
        $ref: '#/definitions/models.User'
      userId:
        type: integer
      whatsappId:
        type: integer
    type: object
  models.User:
    properties:
      alcance:
        type: string
      cargo:
        $ref: '#/definitions/models.Cargo'
      cargoId:
        type: integer
      configs:
        type: string
      createdAt:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      queues:
        items:
          $ref: '#/definitions/models.Queue'
        type: array
      tenant:
        allOf:
        - $ref: '#/definitions/models.Tenant'
        description: Relations
      tenantId:
        type: string
      tokenVersion:
        type: integer
      updatedAt:
        type: string
      whatsappId:
        type: integer
    type: object
  models.Whatsapp:
    properties:
      battery:
        type: string
      connectionGroupId:
        type: integer
      createdAt:
        type: string
      engineType:
        type: string
      farewellMessage:
        type: string
      firstConnection:
        type: string
      greetingMessage:
        type: string
      id:
        type: integer
      isDefault:
        type: boolean
      keepAlive:
        type: boolean
      lastConnectedAt:
        type: string
      name:
        type: string
      number:
        type: string
      plugged:
        type: boolean
      profilePicUrl:
        type: string
      proxyGroupId:
        type: integer
      proxyId:
        type: integer
      proxyMode:
        description: |-
          Proxy assignment (anti-ban). ProxyMode: "none" | "single" | "group".
            single → ProxyID fixo. group → ProxyGroupID + ProxyID guarda o pick atual
            (sticky) ou o último usado (rotate).
        type: string
      qrcode:
        type: string
      queues:
        items:
          $ref: '#/definitions/models.Queue'
        type: array
      retries:
        type: integer
      session:
        type: string
      status:
        type: string
      syncHistory:
        type: boolean
      syncPeriod:
        type: string
      tenantId:
        type: string
      tickets:
        description: Relations
        items:
          $ref: '#/definitions/models.Ticket'
        type: array
      updatedAt:
        type: string
      wid:
        type: string
    type: object
  pluginlicense.CatalogPlugin:
    properties:
      category:
        type: string
      description:
        type: string
      iconUrl:
        type: string
      id:
        type: string
      name:
        type: string
      price:
        type: number
      slug:
        type: string
      type:
        type: string
      version:
        type: string
    type: object
  pluginlicense.CatalogResponse:
    properties:
      offline:
        type: boolean
      plugins:
        items:
          $ref: '#/definitions/pluginlicense.CatalogPlugin'
        type: array
    type: object
  pluginlicense.InstanceResponse:
    properties:
      instanceId:
        type: string
    type: object
host: localhost:8082
info:
  contact:
    email: dev@watink.com.br
    name: Watink Dev
  description: API do backend Go — atendimento e automação WhatsApp.
  license:
    name: Proprietary
    url: https://watink.com.br
  termsOfService: https://watink.com.br/terms
  title: Watink Business API
  version: 2.0.0
paths:
  /addresses/lookup:
    get:
      parameters:
      - description: CEP (com ou sem máscara)
        in: query
        name: cep
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Bad Gateway
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Buscar endereço por CEP
      tags:
      - addresses
  /auth/login:
    post:
      consumes:
      - application/json
      description: Autentica usuário e retorna JWT de acesso e refresh token
      parameters:
      - description: Credenciais
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controllers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login
      tags:
      - auth
  /auth/logout:
    delete:
      description: Invalida o refresh token no cookie
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - auth
  /auth/refresh_token:
    post:
      description: Renova o access token usando o refresh token no cookie
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Refresh token
      tags:
      - auth
  /cargos:
