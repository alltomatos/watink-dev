      security:
      - BearerAuth: []
      summary: Listar cargos
      tags:
      - cargos
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Cargo'
      security:
      - BearerAuth: []
      summary: Criar cargo
      tags:
      - cargos
  /cargos/{cargoId}:
    delete:
      parameters:
      - description: ID do cargo
        in: path
        name: cargoId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Excluir cargo
      tags:
      - cargos
    get:
      parameters:
      - description: ID do cargo
        in: path
        name: cargoId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Cargo'
      security:
      - BearerAuth: []
      summary: Detalhar cargo
      tags:
      - cargos
    put:
      consumes:
      - application/json
      parameters:
      - description: ID do cargo
        in: path
        name: cargoId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
