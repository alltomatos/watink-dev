            type: object
      security:
      - BearerAuth: []
      summary: Detalhar contato
      tags:
      - contacts
    put:
      consumes:
      - application/json
      parameters:
      - description: ID do contato
        in: path
        name: contactId
        required: true
        type: integer
      - description: Campos a atualizar
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
