version: '3.8'

services:
  backend:
    image: watink/backend:1.3.133
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    environment:
      - DB_DIALECT=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_NAME=watink
      - AMQP_URL=amqp://***REMOVED_AMQP_CREDENTIALS***@rabbitmq:5672
      - JWT_SECRET=***REMOVED_JWT_SECRET***
      - JWT_REFRESH_SECRET=***REMOVED_JWT_REFRESH_SECRET***
      - FRONTEND_URL=http://localhost
      - URL_BACKEND=http://localhost:8081
      - ENGINE_VERSION=1.0.90
      - PORT=8080
      - NODE_OPTIONS=--max-old-space-size=800
    ports:
      - "8081:8080"
    volumes:
      - ./backend/public:/app/public
    networks:
      - watink_public
      - watink_private
    dns:
      - 192.168.26.253
      - 8.8.8.8
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: '0.50'
          memory: 1024M

  frontend:
    image: watink/frontend:0.7.24
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
    environment:
      - URL_BACKEND=backend:8080
      - VITE_BACKEND_URL=/
      - VITE_PLUGIN_MANAGER_URL=/plugins/
      - VITE_HOURS_CLOSE_TICKETS_AUTO=24
    ports:
      - "80:80"
    networks:
      - watink_public
      - watink_private
    dns:
      - 192.168.26.253
      - 8.8.8.8
    deploy:
      mode: replicated
      replicas: 1

  whaileys-engine:
    image: watink/engine:1.0.90
    environment:
      - AMQP_URL=amqp://***REMOVED_AMQP_CREDENTIALS***@rabbitmq:5672
    networks:
      - watink_private
      - watink_public
    volumes:
      - sessions_auth_data:/usr/src/app/.sessions_auth/
    dns:
      - 192.168.26.253
      - 8.8.8.8
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '0.50'
          memory: 2048M

  flow-engine-worker:
    image: watink/backend:1.3.133
    command: ["node", "dist/flow-worker.js"]
    environment:
      - DB_DIALECT=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_NAME=watink
      - AMQP_URL=amqp://***REMOVED_AMQP_CREDENTIALS***@rabbitmq:5672
    networks:
      - watink_private
    dns:
      - 192.168.26.253
      - 8.8.8.8
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  plugin-manager:
    image: watink/plugin-manager:1.0.19
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/watink?sslmode=disable
      - PLUGIN_CDN_URL=http://localhost:3005
      - PORT=3005
      - ENVIRONMENT=production
    ports:
      - "3005:3005"
    networks:
      - watink_private
      - watink_public
    dns:
      - 192.168.26.253
      - 8.8.8.8
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  rabbitmq:
    image: rabbitmq:3-management-alpine
    networks:
      - watink_private
    ports:
      - "15673:15672"
    dns:
      - 192.168.26.253
      - 8.8.8.8
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 1024M

  postgres:
    image: ronaldodavi/pgvectorgis:latest
    environment:
      - POSTGRES_DB=watink
      - POSTGRES_PASSWORD=postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - watink_private
    dns:
      - 192.168.26.253
      - 8.8.8.8
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  watink_public:
    driver: overlay
  watink_private:
    driver: overlay

volumes:
  db_data:
  sessions_auth_data:
  backend_public_data:
